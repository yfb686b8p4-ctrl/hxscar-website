name: 每周SEO自动更新

on:
  schedule:
    # 每周一早上8:00（北京时间 = UTC 0:00）运行
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行每周轮换脚本
        run: python3 weekly_rotation.py

      - name: 提交更新
        run: |
          git config user.name "自动更新机器人"
          git config user.email "auto-update@hxscar.xyz"
          git add index.html weekly_rotation.py
          git diff --quiet && echo "无变化，跳过提交" || git commit -m "📅 每周SEO自动更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d 第%V周')"
          git push
